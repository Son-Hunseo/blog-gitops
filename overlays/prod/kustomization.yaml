apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: son-blog-image
    newName: harbor.onprem.local/son/blog
    newTag: "0.9"

patches:
  - target:
      kind: Deployment
      name: son-blog-base-deploy
    path: deploy-patch.yaml
  - target:
      kind: Service
      name: son-blog-base-service
    path: service-patch.yaml
  - target:
      kind: HTTPRoute
      name: son-blog-base-route
    path: http-route-patch.yaml
